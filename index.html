<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Makerlab 1.0 - CRM para Maker Home">
    <title>Makerlab 1.0 - CRM</title>
    <link rel="stylesheet" href="css/core.css">
</head>
<body>

    <!-- =========================================
         LOGIN SCREEN
         ========================================= -->
    <section id="login-screen">
        <div class="login-box">
            <h1>Makerlab 1.0</h1>
            <p class="subtitle">CRM para Maker Home</p>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input
                        type="email"
                        id="login-email"
                        name="email"
                        placeholder="tu@email.com"
                        required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Entrar
                </button>

                <p class="error-msg" id="login-error"></p>
            </form>
        </div>
    </section>

    <!-- =========================================
         DASHBOARD SCREEN
         ========================================= -->
    <section id="dashboard-screen" class="hidden">

        <!-- Header -->
        <header class="app-header">
            <div class="header-inner">
                <div class="brand">
                    <span class="logo-dot"></span>
                    <span>Makerlab 1.0</span>
                </div>
                <div class="user-info">
                    <span class="user-email" id="user-email">usuario@makerlab.mx</span>
                </div>
            </div>
        </header>

        <!-- Nav -->
        <nav class="app-nav">
            <ul>
                <li><button data-module="crm" class="nav-btn active">CRM</button></li>
                <li><button data-module="cotizador" class="nav-btn">Cotizador</button></li>
                <li><button data-module="pipeline" class="nav-btn">Pipeline</button></li>
                <li><button id="btn-logout" class="nav-btn">Salir</button></li>
            </ul>
        </nav>

        <!-- Main: contiene un .module-container por cada módulo -->
        <main class="app-main">

            <!-- CRM -->
            <div id="module-crm" class="module-container">
                <div class="page-header">
                    <h2>CRM - Contactos</h2>
                    <button
                        id="btn-new-contacto"
                        data-action="new-contacto"
                        class="btn btn-primary">
                        + Nuevo Contacto
                    </button>
                </div>
                <div id="crm-table"></div>
            </div>

            <!-- COTIZADOR -->
            <div id="module-cotizador" class="module-container hidden">
                <div class="page-header">
                    <h2>Cotizador</h2>
                </div>

                <form id="cotizador-form" class="card">
                    <h3>Nueva cotización</h3>

                    <div class="form-group">
                        <label for="cot-cliente">Cliente</label>
                        <select id="cot-cliente" name="contacto_id" required>
                            <option value="">Selecciona un cliente…</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cot-monto">Monto</label>
                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            id="cot-monto"
                            name="monto"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="cot-items">Items (JSON)</label>
                        <textarea
                            id="cot-items"
                            name="items"
                            rows="4"
                            placeholder='[{"descripcion":"Servicio","cantidad":1,"precio":1000}]'></textarea>
                    </div>

                    <button type="submit" id="btn-save-cot" class="btn btn-primary">
                        Guardar
                    </button>
                    <p class="error-msg" id="cot-error"></p>
                </form>

                <div id="cotizador-table"></div>
            </div>

            <!-- PIPELINE -->
            <div id="module-pipeline" class="module-container hidden">
                <div class="page-header">
                    <h2>Pipeline</h2>
                </div>
                <div id="pipeline-table"></div>
            </div>

        </main>
    </section>

    <!-- =========================================
         SUPABASE (UMD desde CDN — expone window.supabase)
         Debe cargar ANTES del script type=module
         ========================================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- =========================================
         APP SCRIPT (ES6 modules)
         ========================================= -->
    <script type="module">
        import { initCRM }       from './js/modules/crm/crm.js';
        import { initCotizador } from './js/modules/cotizador/cotizador.js';
        import { initPipeline }  from './js/modules/pipeline/pipeline.js';

        /* ---------- Refs ---------- */
        const loginScreen     = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loginForm       = document.getElementById('login-form');
        const loginError      = document.getElementById('login-error');
        const userEmail       = document.getElementById('user-email');
        const btnLogout       = document.getElementById('btn-logout');
        const navButtons      = document.querySelectorAll('.nav-btn[data-module]');

        /* ---------- Cambio de módulo ---------- */
        /**
         * Oculta todos los .module-container, muestra el solicitado
         * y dispara el init() correspondiente.
         */
        function switchModule(moduleName) {
            // 1. Ocultar todos
            document.querySelectorAll('.module-container').forEach((el) => {
                el.classList.add('hidden');
            });

            // 2. Mostrar el activo
            const target = document.getElementById('module-' + moduleName);
            if (target) target.classList.remove('hidden');

            // 3. Marcar nav activo
            navButtons.forEach((b) => {
                b.classList.toggle('active', b.dataset.module === moduleName);
            });

            // 4. Llamar al init() del módulo
            try {
                if (moduleName === 'crm') {
                    initCRM('#crm-table');
                } else if (moduleName === 'cotizador') {
                    initCotizador('#cotizador-table');
                } else if (moduleName === 'pipeline') {
                    initPipeline('#pipeline-table');
                }
            } catch (err) {
                console.error('[app] error inicializando módulo', moduleName, err);
            }
        }

        /* ---------- Auth (DEMO - sin auth real) ---------- */
        function showDashboard(email) {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            userEmail.textContent = email;
            switchModule('crm'); // default al entrar
        }

        function showLogin() {
            dashboardScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            loginForm.reset();
            loginError.textContent = '';
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                loginError.textContent = 'Completa email y contraseña.';
                return;
            }
            loginError.textContent = '';
            showDashboard(email); // DEMO: cualquier credencial entra
        });

        btnLogout.addEventListener('click', showLogin);

        /* ---------- Nav ---------- */
        navButtons.forEach((btn) => {
            btn.addEventListener('click', () => switchModule(btn.dataset.module));
        });

        /* ---------- Expuesto para debug en consola ---------- */
        window.switchModule = switchModule;
    </script>
</body>
</html>
